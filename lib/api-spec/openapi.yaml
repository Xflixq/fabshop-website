openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FabShop API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog
  - name: categories
    description: Product categories
  - name: cart
    description: Shopping cart
  - name: orders
    description: Order management
  - name: catalog
    description: Catalog summary and aggregates
  - name: admin
    description: Admin / inventory management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all product categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get a category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with optional filters
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: inStock
          in: query
          required: false
          schema:
            type: boolean
        - name: featured
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get current cart
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    post:
      operationId: addToCart
      tags: [cart]
      summary: Add an item to the cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartBody"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/item/{cartItemId}:
    put:
      operationId: updateCartItem
      tags: [cart]
      summary: Update cart item quantity
      parameters:
        - name: cartItemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartItemBody"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      operationId: removeCartItem
      tags: [cart]
      summary: Remove an item from the cart
      parameters:
        - name: cartItemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create an order from cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /catalog/summary:
    get:
      operationId: getCatalogSummary
      tags: [catalog]
      summary: Get catalog stats
      responses:
        "200":
          description: Catalog summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogSummary"

  /catalog/featured:
    get:
      operationId: getFeaturedProducts
      tags: [catalog]
      summary: Get featured products
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /catalog/category-counts:
    get:
      operationId: getCategoryCounts
      tags: [catalog]
      summary: Get product count per category
      responses:
        "200":
          description: Category counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

  /admin/inventory:
    get:
      operationId: getInventory
      tags: [admin]
      summary: Get full inventory list with stock levels
      responses:
        "200":
          description: Inventory list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /admin/inventory/{id}/adjust:
    post:
      operationId: adjustStock
      tags: [admin]
      summary: Adjust stock quantity for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustStockBody"
      responses:
        "200":
          description: Updated inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /admin/low-stock:
    get:
      operationId: getLowStockProducts
      tags: [admin]
      summary: Get products with stock at or below threshold
      responses:
        "200":
          description: Low stock products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Get admin dashboard summary
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /admin/orders:
    get:
      operationId: listAdminOrders
      tags: [admin]
      summary: List all orders for admin with full details
      responses:
        "200":
          description: All orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /admin/send-low-stock-alert:
    post:
      operationId: sendLowStockAlert
      tags: [admin]
      summary: Send low stock email alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAlertBody"
      responses:
        "200":
          description: Alert sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertResult"

  /admin/label/{productId}:
    get:
      operationId: getProductLabel
      tags: [admin]
      summary: Get label data for a product (for printing)
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Label data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductLabel"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        imageUrl:
          type: string
          nullable: true
        productCount:
          type: integer
      required:
        - id
        - name
        - slug
        - description
        - productCount

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        imageUrl:
          type: string
          nullable: true
      required:
        - name
        - slug
        - description

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        sku:
          type: string
        stockQty:
          type: integer
        lowStockThreshold:
          type: integer
        imageUrl:
          type: string
          nullable: true
        featured:
          type: boolean
        categoryId:
          type: integer
          nullable: true
        categoryName:
          type: string
          nullable: true
        specs:
          type: string
          nullable: true
      required:
        - id
        - name
        - slug
        - description
        - price
        - sku
        - stockQty
        - lowStockThreshold
        - featured

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        sku:
          type: string
        stockQty:
          type: integer
        lowStockThreshold:
          type: integer
        imageUrl:
          type: string
          nullable: true
        featured:
          type: boolean
        categoryId:
          type: integer
          nullable: true
        specs:
          type: string
          nullable: true
      required:
        - name
        - slug
        - description
        - price
        - sku
        - stockQty
        - lowStockThreshold
        - featured

    CartItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        productImageUrl:
          type: string
          nullable: true
        price:
          type: number
          format: float
        quantity:
          type: integer
        subtotal:
          type: number
          format: float
      required:
        - id
        - productId
        - productName
        - price
        - quantity
        - subtotal

    Cart:
      type: object
      properties:
        sessionId:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        total:
          type: number
          format: float
        itemCount:
          type: integer
      required:
        - sessionId
        - items
        - total
        - itemCount

    AddToCartBody:
      type: object
      properties:
        sessionId:
          type: string
        productId:
          type: integer
        quantity:
          type: integer
      required:
        - sessionId
        - productId
        - quantity

    UpdateCartItemBody:
      type: object
      properties:
        quantity:
          type: integer
      required:
        - quantity

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        price:
          type: number
          format: float
        quantity:
          type: integer
        subtotal:
          type: number
          format: float
      required:
        - id
        - productId
        - productName
        - price
        - quantity
        - subtotal

    Order:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: string
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
        total:
          type: number
          format: float
        customerName:
          type: string
        customerEmail:
          type: string
        shippingAddress:
          type: string
        clerkUserId:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sessionId
        - status
        - total
        - customerName
        - customerEmail
        - shippingAddress
        - items
        - createdAt

    CreateOrderBody:
      type: object
      properties:
        sessionId:
          type: string
        customerName:
          type: string
        customerEmail:
          type: string
        shippingAddress:
          type: string
      required:
        - sessionId
        - customerName
        - customerEmail
        - shippingAddress

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
      required:
        - status

    CatalogSummary:
      type: object
      properties:
        totalProducts:
          type: integer
        totalCategories:
          type: integer
        featuredCount:
          type: integer
        inStockCount:
          type: integer
      required:
        - totalProducts
        - totalCategories
        - featuredCount
        - inStockCount

    CategoryCount:
      type: object
      properties:
        categoryId:
          type: integer
        categoryName:
          type: string
        count:
          type: integer
      required:
        - categoryId
        - categoryName
        - count

    InventoryItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
        stockQty:
          type: integer
        lowStockThreshold:
          type: integer
        isLowStock:
          type: boolean
        price:
          type: number
          format: float
        categoryName:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
      required:
        - id
        - name
        - sku
        - stockQty
        - lowStockThreshold
        - isLowStock
        - price

    AdjustStockBody:
      type: object
      properties:
        adjustment:
          type: integer
          description: Positive to add, negative to remove
        reason:
          type: string
          nullable: true
      required:
        - adjustment

    AdminDashboard:
      type: object
      properties:
        totalProducts:
          type: integer
        totalCategories:
          type: integer
        totalOrders:
          type: integer
        totalRevenue:
          type: number
          format: float
        lowStockCount:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        lowStockItems:
          type: array
          items:
            $ref: "#/components/schemas/InventoryItem"
      required:
        - totalProducts
        - totalCategories
        - totalOrders
        - totalRevenue
        - lowStockCount
        - recentOrders
        - lowStockItems

    SendAlertBody:
      type: object
      properties:
        email:
          type: string
        productIds:
          type: array
          items:
            type: integer
          nullable: true
      required:
        - email

    AlertResult:
      type: object
      properties:
        sent:
          type: boolean
        message:
          type: string
        itemCount:
          type: integer
      required:
        - sent
        - message
        - itemCount

    ProductLabel:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
        price:
          type: number
          format: float
        barcode:
          type: string
        categoryName:
          type: string
          nullable: true
        stockQty:
          type: integer
      required:
        - id
        - name
        - sku
        - price
        - barcode
        - stockQty
